name: Publish @khoralabs/sqlite-migrate

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Dry run only (do not publish to npm)
        type: boolean
        required: true
        default: true

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/sqlite-migrate
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: npm publish (dry run)
        if: inputs.dry_run
        run: npm publish --dry-run

      - name: npm publish
        if: ${{ !inputs.dry_run }}
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
